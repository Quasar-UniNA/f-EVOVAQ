name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # Parte quando crei un tag tipo v1.0.0

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # QUESTE DUE RIGHE SONO FONDAMENTALI PER IL TRUSTED PUBLISHING
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4 # Versione aggiornata (Node 24 compatibile)

      - name: Set up Python
        uses: actions/setup-python@v5 # Versione aggiornata
        with:
          python-version: "3.11"

      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # NOTA: Non serve più 'user' e 'password' perché abbiamo id-token: write
